<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Discussion</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="icon" type="image/png" sizes="256x256" href="/static/favicon-256.png" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>LLM Discussion</h1>
      <p>Pose a question. Let Claude, ChatGPT, and Gemini discuss it.</p>
    </header>

    <div class="input-panel" id="inputPanel">
      <textarea id="topicInput" placeholder="Enter a topic or question..."></textarea>

      <div class="attachment-row">
        <input type="file" id="attachmentInput" accept="image/png,image/jpeg,image/gif,image/webp,.pdf" style="display:none">
        <button type="button" id="attachBtn">Attach image or PDF</button>
        <div class="attachment-chip" id="attachmentChip" style="display:none">
          <span id="attachmentName"></span>
          <button type="button" class="clear-attach-btn" id="clearAttachBtn">×</button>
        </div>
      </div>

      <div class="controls">
        <div class="control-group">
          <label for="roundsSelect">Rounds:</label>
          <select id="roundsSelect">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
          </select>
        </div>

        <div class="control-group">
          <label for="lengthSelect">Response length:</label>
          <select id="lengthSelect">
            <option value="concise">Concise</option>
            <option value="standard" selected>Standard</option>
            <option value="detailed">Detailed</option>
          </select>
        </div>

        <div class="model-toggles">
          <label class="model-toggle">
            <input type="checkbox" value="claude" checked /> Claude
          </label>
          <label class="model-toggle">
            <input type="checkbox" value="chatgpt" checked /> ChatGPT
          </label>
          <label class="model-toggle">
            <input type="checkbox" value="gemini" checked /> Gemini
          </label>
        </div>
      </div>

      <div class="buttons">
        <button id="startBtn">Start Discussion</button>
      </div>
    </div>

    <div class="status" id="status">
      <div class="spinner"></div>
      <span id="statusText">Starting discussion...</span>
      <span id="elapsedText" style="margin-left:auto;color:#64748b;font-size:0.82rem;"></span>
    </div>

    <div class="discussion-actions" id="discussionActions" style="display:none">
      <button id="copyAllBtn"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>Copy All Responses</button>
      <button id="saveAllBtn">Save Discussion</button>
    </div>

    <div class="discussion-area" id="discussionArea"></div>

    <div class="followup-panel" id="followupPanel" style="display:none">
      <h3>Ask a Follow-up</h3>
      <textarea id="followupInput" placeholder="Ask a follow-up question..."></textarea>

      <div class="attachment-row">
        <input type="file" id="followupAttachmentInput" accept="image/png,image/jpeg,image/gif,image/webp,.pdf" style="display:none">
        <button type="button" id="followupAttachBtn">Attach image or PDF</button>
        <div class="attachment-chip" id="followupAttachmentChip" style="display:none">
          <span id="followupAttachmentName"></span>
          <button type="button" class="clear-attach-btn" id="followupClearAttachBtn">×</button>
        </div>
      </div>

      <div class="controls" style="margin-top:0.75rem">
        <div class="control-group">
          <label for="followupRoundsSelect">Rounds:</label>
          <select id="followupRoundsSelect">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
          </select>
        </div>
        <div class="control-group">
          <label for="followupLengthSelect">Response length:</label>
          <select id="followupLengthSelect">
            <option value="concise">Concise</option>
            <option value="standard" selected>Standard</option>
            <option value="detailed">Detailed</option>
          </select>
        </div>
        <div class="model-toggles" id="followupModelToggles">
          <label class="model-toggle">
            <input type="checkbox" value="claude" checked /> Claude
          </label>
          <label class="model-toggle">
            <input type="checkbox" value="chatgpt" checked /> ChatGPT
          </label>
          <label class="model-toggle">
            <input type="checkbox" value="gemini" checked /> Gemini
          </label>
        </div>
      </div>

      <div class="buttons" style="margin-top:0.75rem">
        <button id="followupBtn">Ask Follow-up</button>
      </div>
      <div class="status" id="followupStatus">
        <div class="spinner"></div>
        <span id="followupStatusText">Running follow-up...</span>
        <span id="followupElapsedText" style="margin-left:auto;color:#64748b;font-size:0.82rem;"></span>
      </div>
    </div>

    <div class="new-discussion-panel" id="newDiscussionPanel" style="display:none">
      <button id="newDiscussionBtn">+ New Discussion</button>
    </div>

    <div class="history-panel" id="historyPanel">
      <div class="history-header open" id="historyHeader">
        <h3>Saved Discussions</h3>
        <span class="history-toggle" id="historyToggle">Hide</span>
      </div>
      <div class="history-list open" id="historyList"></div>
    </div>

    <footer>
      <button id="stopBtn">Stop Server</button>
    </footer>
  </div>

  <script>
    let currentDiscussion = null;
    let elapsedInterval = null;
    let attachmentData = null;
    let followupAttachmentData = null;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const topicInput = document.getElementById('topicInput');
    const roundsSelect = document.getElementById('roundsSelect');
    const discussionArea = document.getElementById('discussionArea');
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const elapsedText = document.getElementById('elapsedText');
    const historyHeader = document.getElementById('historyHeader');
    const historyList = document.getElementById('historyList');
    const historyToggle = document.getElementById('historyToggle');
    const lengthSelect = document.getElementById('lengthSelect');
    const followupPanel = document.getElementById('followupPanel');
    const followupInput = document.getElementById('followupInput');
    const followupBtn = document.getElementById('followupBtn');
    const followupStatus = document.getElementById('followupStatus');
    const followupStatusText = document.getElementById('followupStatusText');
    const followupElapsedText = document.getElementById('followupElapsedText');
    let followupElapsedInterval = null;
    const discussionActions = document.getElementById('discussionActions');
    const copyAllBtn = document.getElementById('copyAllBtn');
    const saveAllBtn = document.getElementById('saveAllBtn');
    const newDiscussionPanel = document.getElementById('newDiscussionPanel');
    const newDiscussionBtn = document.getElementById('newDiscussionBtn');

    const attachmentInput = document.getElementById('attachmentInput');
    const attachBtn = document.getElementById('attachBtn');
    const attachmentChip = document.getElementById('attachmentChip');
    const attachmentName = document.getElementById('attachmentName');
    const clearAttachBtn = document.getElementById('clearAttachBtn');
    const followupAttachmentInput = document.getElementById('followupAttachmentInput');
    const followupAttachBtn = document.getElementById('followupAttachBtn');
    const followupAttachmentChip = document.getElementById('followupAttachmentChip');
    const followupAttachmentName = document.getElementById('followupAttachmentName');
    const followupClearAttachBtn = document.getElementById('followupClearAttachBtn');
    const followupRoundsSelect = document.getElementById('followupRoundsSelect');
    const followupLengthSelect = document.getElementById('followupLengthSelect');

    function getFollowupSelectedModels() {
      return Array.from(document.querySelectorAll('#followupModelToggles input:checked')).map(cb => cb.value);
    }

    function syncFollowupControls(models, responseLength) {
      followupRoundsSelect.value = roundsSelect.value;
      followupLengthSelect.value = responseLength || 'standard';
      document.querySelectorAll('#followupModelToggles input').forEach(cb => {
        cb.checked = models.includes(cb.value);
      });
    }

    function readFileAsAttachment(file) {
      if (file.type.startsWith('image/')) {
        return resizeImage(file);
      }
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve({ mime_type: file.type, data: e.target.result.split(',')[1], name: file.name });
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function resizeImage(file) {
      const MAX_DIMENSION = 2048;
      const MAX_BYTES = 4.5 * 1024 * 1024;
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let { width, height } = img;
          if (width > MAX_DIMENSION || height > MAX_DIMENSION) {
            if (width >= height) {
              height = Math.round(height * MAX_DIMENSION / width);
              width = MAX_DIMENSION;
            } else {
              width = Math.round(width * MAX_DIMENSION / height);
              height = MAX_DIMENSION;
            }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);

          // Preserve original format; GIF falls back to PNG (canvas can't output GIF)
          const outMime = file.type === 'image/gif' ? 'image/png' : file.type;
          let dataUrl = canvas.toDataURL(outMime);
          let mimeUsed = outMime;
          let name = file.name;

          // If still too large after resizing, fall back to JPEG compression
          if (dataUrl.length * 0.75 > MAX_BYTES) {
            let quality = 0.92;
            do {
              dataUrl = canvas.toDataURL('image/jpeg', quality);
              quality = Math.round((quality - 0.1) * 100) / 100;
            } while (dataUrl.length * 0.75 > MAX_BYTES && quality >= 0.1);
            mimeUsed = 'image/jpeg';
            name = file.name.replace(/\.[^.]+$/, '.jpg');
          }

          resolve({ mime_type: mimeUsed, data: dataUrl.split(',')[1], name });
        };
        img.onerror = reject;
        img.src = url;
      });
    }

    attachBtn.addEventListener('click', () => attachmentInput.click());
    attachmentInput.addEventListener('change', async () => {
      const file = attachmentInput.files[0];
      if (!file) return;
      attachmentData = await readFileAsAttachment(file);
      attachmentName.textContent = file.name;
      attachmentChip.style.display = '';
    });
    clearAttachBtn.addEventListener('click', () => {
      attachmentData = null;
      attachmentInput.value = '';
      attachmentChip.style.display = 'none';
    });

    followupAttachBtn.addEventListener('click', () => followupAttachmentInput.click());
    followupAttachmentInput.addEventListener('change', async () => {
      const file = followupAttachmentInput.files[0];
      if (!file) return;
      followupAttachmentData = await readFileAsAttachment(file);
      followupAttachmentName.textContent = file.name;
      followupAttachmentChip.style.display = '';
    });
    followupClearAttachBtn.addEventListener('click', () => {
      followupAttachmentData = null;
      followupAttachmentInput.value = '';
      followupAttachmentChip.style.display = 'none';
    });

    const ACCEPTED_TYPES = new Set(['image/png', 'image/jpeg', 'image/gif', 'image/webp', 'application/pdf']);

    function setupDropZone(el, onFile) {
      let counter = 0;
      el.addEventListener('dragenter', (e) => {
        if (!e.dataTransfer.types.includes('Files')) return;
        e.preventDefault();
        if (++counter === 1) el.classList.add('drag-over');
      });
      el.addEventListener('dragleave', () => {
        if (--counter === 0) el.classList.remove('drag-over');
      });
      el.addEventListener('dragover', (e) => {
        if (e.dataTransfer.types.includes('Files')) e.preventDefault();
      });
      el.addEventListener('drop', async (e) => {
        e.preventDefault();
        counter = 0;
        el.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (!file || !ACCEPTED_TYPES.has(file.type)) return;
        await onFile(file);
      });
    }

    setupDropZone(document.getElementById('inputPanel'), async (file) => {
      attachmentData = await readFileAsAttachment(file);
      attachmentName.textContent = attachmentData.name;
      attachmentChip.style.display = '';
    });

    setupDropZone(followupPanel, async (file) => {
      followupAttachmentData = await readFileAsAttachment(file);
      followupAttachmentName.textContent = followupAttachmentData.name;
      followupAttachmentChip.style.display = '';
    });

    copyAllBtn.addEventListener('click', () => {
      copyToClipboard(buildThreadText(), copyAllBtn);
    });

    async function saveDiscussion(btn) {
      if (!currentDiscussion) return;
      const origText = btn.textContent;
      btn.disabled = true;
      try {
        const res = await fetch('/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentDiscussion),
        });
        const data = await res.json();
        if (data.filename) {
          btn.textContent = 'Saved!';
          loadHistory();
          setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 2000);
        }
      } catch (err) {
        btn.disabled = false;
        alert('Save failed: ' + err.message);
      }
    }

    saveAllBtn.addEventListener('click', () => saveDiscussion(saveAllBtn));

    newDiscussionBtn.addEventListener('click', () => {
      discussionArea.innerHTML = '';
      currentDiscussion = null;
      discussionActions.style.display = 'none';
      followupPanel.style.display = 'none';
      newDiscussionPanel.style.display = 'none';
      topicInput.value = '';
      attachmentData = null;
      attachmentInput.value = '';
      attachmentChip.style.display = 'none';
      followupInput.value = '';
      followupAttachmentData = null;
      followupAttachmentInput.value = '';
      followupAttachmentChip.style.display = 'none';
      topicInput.focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    function getSelectedModels() {
      return Array.from(document.querySelectorAll('.model-toggles input:checked')).map(cb => cb.value);
    }

    function showStatus(text) {
      statusText.textContent = text;
      status.classList.add('visible');
      const start = Date.now();
      elapsedText.textContent = '0s';
      clearInterval(elapsedInterval);
      elapsedInterval = setInterval(() => {
        elapsedText.textContent = Math.floor((Date.now() - start) / 1000) + 's';
      }, 1000);
    }

    function hideStatus() {
      status.classList.remove('visible');
      clearInterval(elapsedInterval);
      elapsedText.textContent = '';
    }

    const ICON_COPY = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`;
    const ICON_CHECK = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 15 4 10"/></svg>`;

    function renderCard(entry) {
      const card = document.createElement('div');
      card.className = 'card' + (entry.error ? ' error-response' : '');
      card.dataset.model = entry.model;

      const roundLabel = entry.round === 0 ? 'Initial Response' : `Round ${entry.round}`;
      const errorBadge = entry.error ? '<span class="error-badge">Error</span>' : '';

      card.innerHTML = `
        <div class="card-header">
          <span class="badge badge-${entry.model}">${entry.model}</span>
          <span class="round-label">${roundLabel}</span>
          ${errorBadge}
          <button class="copy-btn" title="Copy response">${ICON_COPY}</button>
        </div>
        <div class="card-text markdown">${marked.parse(entry.text)}</div>
      `;

      card.querySelector('.copy-btn').addEventListener('click', () => {
        copyToClipboard(entry.text, card.querySelector('.copy-btn'));
      });

      discussionArea.appendChild(card);
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const origHTML = btn.innerHTML;
        btn.innerHTML = ICON_CHECK;
        setTimeout(() => { btn.innerHTML = origHTML; }, 1500);
      });
    }

    function buildThreadText() {
      if (!currentDiscussion) return '';
      const lines = [`Topic: ${currentDiscussion.topic}`, ''];

      const rounds = {};
      for (const entry of currentDiscussion.discussion) {
        if (!rounds[entry.round]) rounds[entry.round] = [];
        rounds[entry.round].push(entry);
      }
      for (const roundNum of Object.keys(rounds).map(Number).sort((a, b) => a - b)) {
        lines.push(`=== ${roundNum === 0 ? 'Initial Responses' : `Round ${roundNum}`} ===`, '');
        for (const entry of rounds[roundNum]) {
          lines.push(`[${entry.model}]${entry.error ? ' [ERROR]' : ''}`, entry.text, '');
        }
      }

      if (currentDiscussion.summary) {
        lines.push('=== Summary & Consensus ===', '', currentDiscussion.summary, '');
      }

      for (let i = 0; i < (currentDiscussion.followups || []).length; i++) {
        const fu = currentDiscussion.followups[i];
        lines.push(`--- Follow-up ${i + 1}: ${fu.question} ---`, '');
        for (const entry of fu.discussion) {
          lines.push(`[${entry.model} - Round ${entry.round}]${entry.error ? ' [ERROR]' : ''}`, entry.text, '');
        }
        if (fu.summary) {
          lines.push(`=== Follow-up ${i + 1} Summary ===`, '', fu.summary, '');
        }
      }
      return lines.join('\n');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showError(msg) {
      const el = document.createElement('div');
      el.className = 'error-card';
      el.textContent = msg;
      discussionArea.appendChild(el);
    }

    startBtn.addEventListener('click', async () => {
      const topic = topicInput.value.trim();
      if (!topic) { topicInput.focus(); return; }

      const models = getSelectedModels();
      if (models.length === 0) { alert('Select at least one model.'); return; }

      const rounds = parseInt(roundsSelect.value, 10);

      discussionArea.innerHTML = '';
      discussionActions.style.display = 'none';
      followupPanel.style.display = 'none';
      followupInput.value = '';
      currentDiscussion = null;
      startBtn.disabled = true;
      showStatus(`Running discussion (${rounds} round${rounds > 1 ? 's' : ''}, ${models.length} model${models.length > 1 ? 's' : ''})...`);

      try {
        const res = await fetch('/discuss', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, rounds, models, response_length: lengthSelect.value, attachment: attachmentData }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          showError(data.error || 'An error occurred.');
        } else {
          currentDiscussion = { ...data, followups: [], models, response_length: lengthSelect.value };
          data.discussion.forEach(renderCard);
          if (data.summary) renderSummary(data.summary);
          discussionActions.style.display = '';
          saveAllBtn.textContent = 'Save Discussion';
          followupPanel.style.display = '';
          newDiscussionPanel.style.display = '';
          syncFollowupControls(models, lengthSelect.value);
        }
      } catch (err) {
        showError(`Network error: ${err.message}`);
      } finally {
        startBtn.disabled = false;
        hideStatus();
      }
    });

    stopBtn.addEventListener('click', async () => {
      if (!confirm('Stop the local server? You\'ll need to relaunch start.bat to use the app again.')) return;
      await fetch('/stop', { method: 'POST' });
      document.body.innerHTML = '<div style="text-align:center;padding:4rem;color:#94a3b8;">Server stopped. Close this tab.</div>';
    });

    // History panel
    historyHeader.addEventListener('click', () => {
      const open = historyList.classList.toggle('open');
      historyHeader.classList.toggle('open', open);
      historyToggle.textContent = open ? 'Hide' : 'Show';
    });

    async function loadHistory() {
      try {
        const res = await fetch('/history');
        const items = await res.json();
        historyList.innerHTML = '';
        if (items.length === 0) {
          historyList.innerHTML = '<div style="padding:0.75rem 1.25rem;color:#64748b;font-size:0.85rem;">No saved discussions yet.</div>';
          return;
        }
        items.forEach(item => {
          const el = document.createElement('div');
          el.className = 'history-item';
          const date = item.timestamp ? new Date(item.timestamp).toLocaleString() : '';
          el.innerHTML = `<div class="h-topic">${escapeHtml(item.topic)}</div><div class="h-date">${date}</div>`;
          el.addEventListener('click', () => loadHistoryItem(item.filename));
          historyList.appendChild(el);
        });
      } catch (err) {
        console.error('Failed to load history:', err);
      }
    }

    function renderSummary(text) {
      const card = document.createElement('div');
      card.className = 'card summary-card';
      card.innerHTML = `
        <div class="card-header">
          <span class="badge badge-summary">Summary &amp; Consensus</span>
          <button class="copy-btn" title="Copy summary">${ICON_COPY}</button>
        </div>
        <div class="card-text markdown">${marked.parse(text)}</div>
        <div class="summary-footer">
          <button class="summary-save-btn">Save Discussion</button>
        </div>
      `;
      card.querySelector('.copy-btn').addEventListener('click', () => {
        copyToClipboard(text, card.querySelector('.copy-btn'));
      });
      const summarysaveBtn = card.querySelector('.summary-save-btn');
      summarysaveBtn.addEventListener('click', () => saveDiscussion(summarysaveBtn));
      discussionArea.appendChild(card);
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function renderFollowupSeparator(question, num) {
      const el = document.createElement('div');
      el.className = 'followup-separator';
      el.innerHTML = `<span>Follow-up ${num}: ${escapeHtml(question)}</span>`;
      discussionArea.appendChild(el);
    }

    followupBtn.addEventListener('click', async () => {
      const question = followupInput.value.trim();
      if (!question || !currentDiscussion) return;

      followupBtn.disabled = true;
      followupStatusText.textContent = `Running follow-up ${currentDiscussion.followups.length + 1}...`;
      followupElapsedText.textContent = '0s';
      followupStatus.classList.add('visible');
      const fuStart = Date.now();
      clearInterval(followupElapsedInterval);
      followupElapsedInterval = setInterval(() => {
        followupElapsedText.textContent = Math.floor((Date.now() - fuStart) / 1000) + 's';
      }, 1000);
      followupStatus.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      try {
        const res = await fetch('/followup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question,
            topic: currentDiscussion.topic,
            discussion: currentDiscussion.discussion,
            followups: currentDiscussion.followups,
            models: getFollowupSelectedModels(),
            rounds: parseInt(followupRoundsSelect.value, 10),
            response_length: followupLengthSelect.value,
            attachment: followupAttachmentData,
          }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          showError(data.error || 'An error occurred.');
        } else {
          const followupNum = currentDiscussion.followups.length + 1;
          renderFollowupSeparator(question, followupNum);
          data.discussion.forEach(renderCard);
          if (data.summary) renderSummary(data.summary);
          discussionActions.style.display = '';
          saveAllBtn.textContent = 'Save Discussion';
          currentDiscussion.followups.push({ question, discussion: data.discussion, summary: data.summary });
          followupInput.value = '';
          followupAttachmentData = null;
          followupAttachmentInput.value = '';
          followupAttachmentChip.style.display = 'none';
        }
      } catch (err) {
        showError(`Network error: ${err.message}`);
      } finally {
        followupBtn.disabled = false;
        followupStatus.classList.remove('visible');
        clearInterval(followupElapsedInterval);
        followupElapsedText.textContent = '';
      }
    });

    async function loadHistoryItem(filename) {
      try {
        const res = await fetch(`/history/${encodeURIComponent(filename)}`);
        const data = await res.json();
        discussionArea.innerHTML = '';
        currentDiscussion = { ...data, followups: data.followups || [], models: data.models || [] };
        followupPanel.style.display = data.models?.length ? '' : 'none';
        if (data.models?.length) syncFollowupControls(data.models, data.response_length);
        newDiscussionPanel.style.display = '';
        followupInput.value = '';
        topicInput.value = data.topic || '';
        data.discussion.forEach(renderCard);
        if (data.summary) renderSummary(data.summary);
        (data.followups || []).forEach((fu, i) => {
          renderFollowupSeparator(fu.question, i + 1);
          fu.discussion.forEach(renderCard);
          if (fu.summary) renderSummary(fu.summary);
        });
        discussionActions.style.display = '';
        saveAllBtn.textContent = 'Save Discussion';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        alert('Failed to load discussion: ' + err.message);
      }
    }

    // Load history on page load
    loadHistory();
  </script>
</body>
</html>
