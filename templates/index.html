<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Discussion</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>LLM Discussion</h1>
      <p>Pose a question. Let Claude, ChatGPT, and Gemini discuss it.</p>
    </header>

    <div class="input-panel">
      <textarea id="topicInput" placeholder="Enter a topic or question..."></textarea>

      <div class="controls">
        <div class="control-group">
          <label for="roundsSelect">Rounds:</label>
          <select id="roundsSelect">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
          </select>
        </div>

        <div class="control-group">
          <label for="lengthSelect">Response length:</label>
          <select id="lengthSelect">
            <option value="concise">Concise</option>
            <option value="standard" selected>Standard</option>
            <option value="detailed">Detailed</option>
          </select>
        </div>

        <div class="model-toggles">
          <label class="model-toggle">
            <input type="checkbox" value="claude" checked /> Claude
          </label>
          <label class="model-toggle">
            <input type="checkbox" value="chatgpt" checked /> ChatGPT
          </label>
          <label class="model-toggle">
            <input type="checkbox" value="gemini" checked /> Gemini
          </label>
        </div>
      </div>

      <div class="buttons">
        <button id="startBtn">Start Discussion</button>
      </div>
    </div>

    <div class="status" id="status">
      <div class="spinner"></div>
      <span id="statusText">Starting discussion...</span>
      <span id="elapsedText" style="margin-left:auto;color:#64748b;font-size:0.82rem;"></span>
    </div>

    <div class="discussion-actions" id="discussionActions" style="display:none">
      <button id="copyAllBtn">Copy All Responses</button>
      <button id="saveAllBtn">Save Discussion</button>
    </div>

    <div class="discussion-area" id="discussionArea"></div>

    <div class="followup-panel" id="followupPanel" style="display:none">
      <h3>Ask a Follow-up</h3>
      <textarea id="followupInput" placeholder="Ask a follow-up question..."></textarea>
      <div class="buttons" style="margin-top:0.75rem">
        <button id="followupBtn">Ask Follow-up</button>
      </div>
      <div class="status" id="followupStatus">
        <div class="spinner"></div>
        <span id="followupStatusText">Running follow-up...</span>
        <span id="followupElapsedText" style="margin-left:auto;color:#64748b;font-size:0.82rem;"></span>
      </div>
    </div>

    <div class="history-panel" id="historyPanel">
      <div class="history-header open" id="historyHeader">
        <h3>Saved Discussions</h3>
        <span class="history-toggle" id="historyToggle">Hide</span>
      </div>
      <div class="history-list open" id="historyList"></div>
    </div>

    <footer>
      <button id="stopBtn">Stop Server</button>
    </footer>
  </div>

  <script>
    let currentDiscussion = null;
    let elapsedInterval = null;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const topicInput = document.getElementById('topicInput');
    const roundsSelect = document.getElementById('roundsSelect');
    const discussionArea = document.getElementById('discussionArea');
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const elapsedText = document.getElementById('elapsedText');
    const historyHeader = document.getElementById('historyHeader');
    const historyList = document.getElementById('historyList');
    const historyToggle = document.getElementById('historyToggle');
    const lengthSelect = document.getElementById('lengthSelect');
    const followupPanel = document.getElementById('followupPanel');
    const followupInput = document.getElementById('followupInput');
    const followupBtn = document.getElementById('followupBtn');
    const followupStatus = document.getElementById('followupStatus');
    const followupStatusText = document.getElementById('followupStatusText');
    const followupElapsedText = document.getElementById('followupElapsedText');
    let followupElapsedInterval = null;
    const discussionActions = document.getElementById('discussionActions');
    const copyAllBtn = document.getElementById('copyAllBtn');
    const saveAllBtn = document.getElementById('saveAllBtn');

    copyAllBtn.addEventListener('click', () => {
      copyToClipboard(buildThreadText(), copyAllBtn);
    });

    saveAllBtn.addEventListener('click', async () => {
      if (!currentDiscussion) return;
      saveAllBtn.disabled = true;
      try {
        const res = await fetch('/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentDiscussion),
        });
        const data = await res.json();
        if (data.filename) {
          saveAllBtn.textContent = 'Saved!';
          loadHistory();
          setTimeout(() => { saveAllBtn.textContent = 'Save Discussion'; saveAllBtn.disabled = false; }, 2000);
        }
      } catch (err) {
        saveAllBtn.disabled = false;
        alert('Save failed: ' + err.message);
      }
    });

    function getSelectedModels() {
      return Array.from(document.querySelectorAll('.model-toggles input:checked')).map(cb => cb.value);
    }

    function showStatus(text) {
      statusText.textContent = text;
      status.classList.add('visible');
      const start = Date.now();
      elapsedText.textContent = '0s';
      clearInterval(elapsedInterval);
      elapsedInterval = setInterval(() => {
        elapsedText.textContent = Math.floor((Date.now() - start) / 1000) + 's';
      }, 1000);
    }

    function hideStatus() {
      status.classList.remove('visible');
      clearInterval(elapsedInterval);
      elapsedText.textContent = '';
    }

    function renderCard(entry) {
      const card = document.createElement('div');
      card.className = 'card' + (entry.error ? ' error-response' : '');
      card.dataset.model = entry.model;

      const roundLabel = entry.round === 0 ? 'Initial Response' : `Round ${entry.round}`;
      const errorBadge = entry.error ? '<span class="error-badge">Error</span>' : '';

      card.innerHTML = `
        <div class="card-header">
          <span class="badge badge-${entry.model}">${entry.model}</span>
          <span class="round-label">${roundLabel}</span>
          ${errorBadge}
          <button class="copy-btn" title="Copy response">Copy</button>
        </div>
        <div class="card-text">${escapeHtml(entry.text)}</div>
      `;

      card.querySelector('.copy-btn').addEventListener('click', () => {
        copyToClipboard(entry.text, card.querySelector('.copy-btn'));
      });

      discussionArea.appendChild(card);
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      });
    }

    function buildThreadText() {
      if (!currentDiscussion) return '';
      const lines = [`Topic: ${currentDiscussion.topic}`, ''];

      const rounds = {};
      for (const entry of currentDiscussion.discussion) {
        if (!rounds[entry.round]) rounds[entry.round] = [];
        rounds[entry.round].push(entry);
      }
      for (const roundNum of Object.keys(rounds).map(Number).sort((a, b) => a - b)) {
        lines.push(`=== ${roundNum === 0 ? 'Initial Responses' : `Round ${roundNum}`} ===`, '');
        for (const entry of rounds[roundNum]) {
          lines.push(`[${entry.model}]${entry.error ? ' [ERROR]' : ''}`, entry.text, '');
        }
      }

      for (let i = 0; i < (currentDiscussion.followups || []).length; i++) {
        const fu = currentDiscussion.followups[i];
        lines.push(`--- Follow-up ${i + 1}: ${fu.question} ---`, '');
        for (const entry of fu.discussion) {
          lines.push(`[${entry.model} - Round ${entry.round}]${entry.error ? ' [ERROR]' : ''}`, entry.text, '');
        }
      }

      if (currentDiscussion.summary) {
        lines.push('=== Summary & Consensus ===', '', currentDiscussion.summary);
      }
      return lines.join('\n');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showError(msg) {
      const el = document.createElement('div');
      el.className = 'error-card';
      el.textContent = msg;
      discussionArea.appendChild(el);
    }

    startBtn.addEventListener('click', async () => {
      const topic = topicInput.value.trim();
      if (!topic) { topicInput.focus(); return; }

      const models = getSelectedModels();
      if (models.length === 0) { alert('Select at least one model.'); return; }

      const rounds = parseInt(roundsSelect.value, 10);

      discussionArea.innerHTML = '';
      discussionActions.style.display = 'none';
      followupPanel.style.display = 'none';
      followupInput.value = '';
      currentDiscussion = null;
      startBtn.disabled = true;
      showStatus(`Running discussion (${rounds} round${rounds > 1 ? 's' : ''}, ${models.length} model${models.length > 1 ? 's' : ''})...`);

      try {
        const res = await fetch('/discuss', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, rounds, models, response_length: lengthSelect.value }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          showError(data.error || 'An error occurred.');
        } else {
          currentDiscussion = { ...data, followups: [], models, response_length: lengthSelect.value };
          data.discussion.forEach(renderCard);
          if (data.summary) renderSummary(data.summary);
          discussionActions.style.display = '';
          saveAllBtn.textContent = 'Save Discussion';
          followupPanel.style.display = '';
        }
      } catch (err) {
        showError(`Network error: ${err.message}`);
      } finally {
        startBtn.disabled = false;
        hideStatus();
      }
    });

    stopBtn.addEventListener('click', async () => {
      if (!confirm('Stop the local server? You\'ll need to relaunch start.bat to use the app again.')) return;
      await fetch('/stop', { method: 'POST' });
      document.body.innerHTML = '<div style="text-align:center;padding:4rem;color:#94a3b8;">Server stopped. Close this tab.</div>';
    });

    // History panel
    historyHeader.addEventListener('click', () => {
      const open = historyList.classList.toggle('open');
      historyHeader.classList.toggle('open', open);
      historyToggle.textContent = open ? 'Hide' : 'Show';
    });

    async function loadHistory() {
      try {
        const res = await fetch('/history');
        const items = await res.json();
        historyList.innerHTML = '';
        if (items.length === 0) {
          historyList.innerHTML = '<div style="padding:0.75rem 1.25rem;color:#64748b;font-size:0.85rem;">No saved discussions yet.</div>';
          return;
        }
        items.forEach(item => {
          const el = document.createElement('div');
          el.className = 'history-item';
          const date = item.timestamp ? new Date(item.timestamp).toLocaleString() : '';
          el.innerHTML = `<div class="h-topic">${escapeHtml(item.topic)}</div><div class="h-date">${date}</div>`;
          el.addEventListener('click', () => loadHistoryItem(item.filename));
          historyList.appendChild(el);
        });
      } catch (err) {
        console.error('Failed to load history:', err);
      }
    }

    function renderSummary(text) {
      const existing = document.getElementById('summaryCard');
      if (existing) existing.remove();
      const card = document.createElement('div');
      card.id = 'summaryCard';
      card.className = 'card summary-card';
      card.innerHTML = `
        <div class="card-header">
          <span class="badge badge-summary">Summary &amp; Consensus</span>
          <button class="copy-btn" title="Copy summary">Copy</button>
        </div>
        <div class="card-text">${escapeHtml(text)}</div>
      `;
      card.querySelector('.copy-btn').addEventListener('click', () => {
        copyToClipboard(text, card.querySelector('.copy-btn'));
      });
      discussionArea.appendChild(card);
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function renderFollowupSeparator(question, num) {
      const el = document.createElement('div');
      el.className = 'followup-separator';
      el.innerHTML = `<span>Follow-up ${num}: ${escapeHtml(question)}</span>`;
      discussionArea.appendChild(el);
    }

    followupBtn.addEventListener('click', async () => {
      const question = followupInput.value.trim();
      if (!question || !currentDiscussion) return;

      const rounds = parseInt(roundsSelect.value, 10);
      followupBtn.disabled = true;
      followupStatusText.textContent = `Running follow-up ${currentDiscussion.followups.length + 1}...`;
      followupElapsedText.textContent = '0s';
      followupStatus.classList.add('visible');
      const fuStart = Date.now();
      clearInterval(followupElapsedInterval);
      followupElapsedInterval = setInterval(() => {
        followupElapsedText.textContent = Math.floor((Date.now() - fuStart) / 1000) + 's';
      }, 1000);
      followupStatus.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      try {
        const res = await fetch('/followup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question,
            topic: currentDiscussion.topic,
            discussion: currentDiscussion.discussion,
            followups: currentDiscussion.followups,
            models: currentDiscussion.models,
            rounds,
            response_length: currentDiscussion.response_length || 'standard',
          }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          showError(data.error || 'An error occurred.');
        } else {
          const followupNum = currentDiscussion.followups.length + 1;
          renderFollowupSeparator(question, followupNum);
          data.discussion.forEach(renderCard);
          if (data.summary) renderSummary(data.summary);
          discussionActions.style.display = '';
          saveAllBtn.textContent = 'Save Discussion';
          currentDiscussion.followups.push({ question, discussion: data.discussion });
          currentDiscussion.summary = data.summary;
          followupInput.value = '';
        }
      } catch (err) {
        showError(`Network error: ${err.message}`);
      } finally {
        followupBtn.disabled = false;
        followupStatus.classList.remove('visible');
        clearInterval(followupElapsedInterval);
        followupElapsedText.textContent = '';
      }
    });

    async function loadHistoryItem(filename) {
      try {
        const res = await fetch(`/history/${encodeURIComponent(filename)}`);
        const data = await res.json();
        discussionArea.innerHTML = '';
        currentDiscussion = { ...data, followups: data.followups || [], models: data.models || [] };
        followupPanel.style.display = data.models?.length ? '' : 'none';
        followupInput.value = '';
        topicInput.value = data.topic || '';
        data.discussion.forEach(renderCard);
        (data.followups || []).forEach((fu, i) => {
          renderFollowupSeparator(fu.question, i + 1);
          fu.discussion.forEach(renderCard);
        });
        if (data.summary) renderSummary(data.summary);
        discussionActions.style.display = '';
        saveAllBtn.textContent = 'Save Discussion';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        alert('Failed to load discussion: ' + err.message);
      }
    }

    // Load history on page load
    loadHistory();
  </script>
</body>
</html>
